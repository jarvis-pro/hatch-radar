packages:
  - apps/*
  - packages/*

# 跨包共享依赖的版本集中在此（pnpm catalog），各 package.json 用 "catalog:" 引用。
# 只收录被 2+ 个包使用、且应当保持同步的依赖；单包独占的依赖仍写在各自 package.json。
# react / react-dom / tailwindcss 虽跨包但版本有意不同（Expo 精确锁定运行时、mobile 用 Tailwind v3
# 而 web/ui 用 v4），无法合并成单一条目，故保持 inline。
catalog:
  # 工具链 / 类型
  typescript: ^6.0.3
  '@types/node': ^25.9.2
  '@types/react': ~19.2.17 # 与下方 overrides 保持一致：整个 workspace 只允许一份
  '@types/react-dom': ^19.2.0
  # 数据库（仅 api 读写；web 纯前端不连库）
  # 主存储 PostgreSQL：api 用 pg；ORM 用 Prisma（塌缩后仅 apps/api 直依赖 @prisma/*，未入 catalog）
  pg: ^8.21.0
  '@types/pg': ^8.20.0
  # 运行时校验
  zod: ^4.4.3
  # UI 工具（ui 库与 mobile 共用同款）
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  lucide-react: ^1.17.0
  # 图表（ui 提供 shadcn chart 封装，web 直接组合 recharts 原语）
  recharts: 3.8.0

# esbuild / @tailwindcss/oxide 需要运行原生模块安装脚本
onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild

# input-otp 的 d.ts 引 react 却未声明 @types/react 可选 peer，
# pnpm 隔离布局下解析不到类型，Context 泛型塌成 {}；这里补上声明
packageExtensions:
  input-otp:
    peerDependencies:
      '@types/react': '*'
    peerDependenciesMeta:
      '@types/react':
        optional: true

# 整个 workspace 只允许一份 @types/react，避免 RN 自动装入旧 19.1.x
# 形成双类型身份（JSX 组件类型校验会互不相容）
overrides:
  '@types/react': ~19.2.17
