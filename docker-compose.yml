# 本地基础设施 + Web 控制台容器化。
#
# - db：PostgreSQL，server 与 web 的唯一主存储（重构后由 SQLite 迁来）。
#   单机/局域网工具，数据卷用本地命名卷即可；生产换托管 PG 只需改 DATABASE_URL。
# - web：Next.js 只读控制台；连同一个 PG（只读用法），写操作仍统一走 server 进程。
#
# server（爬取 + AI 分析 + 密钥）按规格仍跑在工作台宿主机上（直连本机 5432）。
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: hatch_radar
    ports:
      - '5432:5432'
    volumes:
      - radar-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U radar -d hatch_radar']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      # web 直连 PG 只读；容器内用服务名 db 访问
      DATABASE_URL: postgres://radar:radar@db:5432/hatch_radar
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  radar-pg:
