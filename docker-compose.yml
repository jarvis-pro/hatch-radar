# 本地开发 / 部署编排。两种用法，由 compose profile 切换：
#
#   ① 轻量开发（默认）：只起基础设施，单进程后端跑在宿主机享原生热重载与本机 claude 登录态。
#        docker compose up -d db                  # 仅 PostgreSQL（最常用）
#        docker compose --profile tools up -d     # 库 + adminer（DB UI）
#        # 然后宿主机：pnpm dev:api / pnpm dev:web
#
#   ② 后端容器化（profile full）：db + api 进容器（仅后端，不含 web）。
#        docker compose --profile full up -d --build   # 后端 API 在 http://localhost:47878/api；web 单独部署（见 README）
#
# ── 服务 ────────────────────────────────────────────────────────────────────
# - db：PostgreSQL，api 的唯一主存储。数据卷用本地命名卷；生产换托管 PG 只改 DATABASE_URL。
#   首次初始化（空卷）经 docker/initdb/ 顺带建出集成测试库 hatch_radar_test（vitest 直连）。
#   无 profile → 任何用法下都会起（全栈也复用它）。
# - adminer（profile tools）：轻量 Web 版 DB 管理 UI（Prisma 视角浏览另有宿主机 `pnpm db:studio`）。
# - api（profile full，单进程后端）：HTTP /api + 鉴权 + 调度 + 内嵌任务执行；启动前自动 prisma migrate
#   deploy（建表）。爬取 + AI 分析 + AI 密钥 + 鉴权权威都在此一个进程。web SPA 不在此托管、单独部署。
#
# 注：容器化跑 AI 须用「API Key 模式」provider（Web 设置页配 + apps/api/.env 填 SETTINGS_SECRET）；
#     claude_cli 订阅模式依赖宿主机已登录的 claude，仅适合宿主机运行，容器内不可用。
#
# 端口（47xxx 段避冲突）：47878（api）、47432（PG）、47900（adminer）。
#
# 常用运维：
#   docker compose --profile full up -d --build   # 起 / 重建全栈（改代码后加 --build）
#   docker compose --profile full logs -f api     # 跟随 api 日志
#   docker compose down                           # 停容器，保留数据卷
#   docker compose down -v                        # 停并删数据卷（连 hatch_radar_test，下次起重新初始化）
#   docker compose exec db createdb -U radar hatch_radar_test   # 老卷补建测试库（仅当库不存在时）
#
# 日志：进程把（结构化 JSON）日志打到 stdout，由 Docker 的 json-file driver
# 负责落盘 + 轮转 + 保留（见 &default-logging）。

# 固定项目名（与目录名一致）：容器 / 卷 / 网络前缀稳定，不随克隆目录名漂移。
name: hatch-radar

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m' # 单文件上限，超过即切
    max-file: '14' # 最多保留 14 个，循环覆盖

# 后端镜像（见根 Dockerfile，跑 TS 源）。单进程归一后只剩 api 一个后端服务用它。
# 仅 profile full 启用；不写 profile 的 db 在任何用法下都会起。
x-backend: &backend
  build:
    context: .
    dockerfile: Dockerfile
  image: hatch-radar-backend:local
  profiles: ['full']
  restart: unless-stopped
  logging: *default-logging

# 后端（api）容器专属环境变量覆盖项（其余配置从宿主机 apps/api/.env 经 env_file 读入容器）。
x-backend-env: &backend-env
  # 容器内连 db 服务（compose 网络内 db:5432）；覆盖 apps/api/.env 里的 localhost:47432
  DATABASE_URL: postgres://radar:radar@db:5432/hatch_radar

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: hatch_radar
    ports:
      - '47432:5432'
    volumes:
      - radar-pg:/var/lib/postgresql/data
      # 首次初始化（空卷）时执行：建集成测试库 hatch_radar_test（见 docker/initdb/）
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U radar -d hatch_radar']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  # 可选 DB 管理 UI；默认不启动，需要时 `docker compose --profile tools up -d`。
  # 访问 http://localhost:47900，登录页 System=PostgreSQL、Server=db、用户/密码=radar/radar。
  adminer:
    image: adminer:5
    profiles: ['tools']
    ports:
      - '47900:8080'
    environment:
      ADMINER_DEFAULT_SERVER: db # 登录页预填服务名（同 compose 网络内可解析）
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # 后端 api（单实例）：HTTP /api（web SPA 单独部署，不在此托管）。启动前自动 migrate deploy → 建表。
  api:
    <<: *backend
    command: ['pnpm', 'start:api']
    ports:
      - '47878:47878'
    # 凭据 / 调优从宿主机 apps/api/.env 读入容器：SETTINGS_SECRET（留空禁用 AI 分析，跑 AI 须填）、
    # SUPER_ADMIN_*（首个超管种子，不填则无账户可登录）、LOG_LEVEL / WORKER_CONCURRENCY 等。
    # 文件缺省（required: false）不报错，全走代码默认值；容器专属项在下方 environment 覆盖。
    env_file:
      - path: apps/api/.env
        required: false
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # /api/health 不鉴权；通了即已 listen（migrate 已完成）。用 node 自带 fetch，免装 curl。
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:47878/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  radar-pg:
