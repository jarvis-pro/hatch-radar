# 本地基础设施（仅数据库）。
#
# - db：PostgreSQL，server 的唯一主存储。单机/局域网工具，数据卷用本地命名卷即可；
#   生产换托管 PG 只需改 DATABASE_URL。
#
# 后端归一后只剩一个应用进程：NestJS server 既发 /api，又同源托管 web 控制台 SPA
# （vite build 产物，见 apps/web/dist）。server（爬取 + AI 分析 + 密钥 + 鉴权权威）
# 跑在工作台宿主机上（直连本机 47432），不再有单独的 web 容器。
#
# 端口映射用 47xxx 段避免与同机其它项目冲突；主机侧映射 47432（PG）。
#
# 日志：进程把（结构化 JSON）日志打到 stdout，由 Docker 的 json-file driver
# 负责落盘 + 轮转 + 保留（见 &default-logging）。
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m' # 单文件上限，超过即切
    max-file: '14' # 最多保留 14 个，循环覆盖

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: hatch_radar
    ports:
      - '47432:5432'
    volumes:
      - radar-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U radar -d hatch_radar']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

volumes:
  radar-pg:
